services:
  atm:
    image: ghcr.io/jquagga/atm:main@sha256:bafb7650bebe34b678b5fd3aa9e687d1be8da9ad27941ce923836d40c8420df0
    container_name: atm
    init: true
    hostname: atm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      - HOSTS=10.0.1.39,10.0.1.246
      - SOM=False
      - CEL=False
      - TFORMAT=%l:%M
